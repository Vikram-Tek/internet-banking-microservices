{{- if .Values.config.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "banking-service.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "banking-service.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.config.data | nindent 2 }}
{{- end }}
