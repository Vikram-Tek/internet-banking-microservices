nameOverride: ""
fullnameOverride: ""

namespace: pte

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: false
  name: ""

replicaCount: 2

containerPort: 8080
servicePort: 80

service:
  type: ClusterIP

resources:
  limits:
    cpu: "1000m"
    memory: "1024Mi"
  requests:
    cpu: "250m"
    memory: "512Mi"

env:
  SPRING_PROFILES_ACTIVE: pte
  JAVA_OPTS: "-Xms256m -Xmx512m"

config:
  enabled: false
  data: {}

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 45
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

istio:
  enabled: true
  gateway: banking-gateway
  hosts:
    - "*"
  routes:
    - route1
  stableWeight: 100
  canaryWeight: 0

labels: {}

k6:
  profile: smoke

app:
  serviceName: ""
  version: "v1"
