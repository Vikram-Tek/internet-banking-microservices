pipeline:
  name: IBM-Core-Baninkg-Service
  identifier: IBMCoreBaninkgService
  projectIdentifier: VN
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Build and Scan
        identifier: Build_and_Scan
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: VikramKube
              namespace: ibm-pte
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Gradle
                  identifier: Gradle
                  spec:
                    connectorRef: Vikram_Docker
                    image: eclipse-temurin:21.0.2_13-jdk-alpine
                    shell: Sh
                    command: |-
                      set -e
                      echo "================================"
                      echo "STEP 1: Gradle Build"
                      echo "================================"

                      cd core-banking-service
                      chmod +x gradlew
                      ./gradlew clean build -x test

                      echo "✓ Gradle build completed successfully"
                      echo "JAR created at: build/libs/core-banking-service-0.0.1-SNAPSHOT.jar"
                    resources:
                      limits:
                        memory: 2Gi
                        cpu: 1000m
              - parallel:
                  - step:
                      type: Semgrep
                      name: Semgrep_1
                      identifier: Semgrep_1
                      spec:
                        mode: orchestration
                        config: default
                        target:
                          type: repository
                          detection: auto
                        advanced:
                          log:
                            level: info
                          fail_on_severity: high
                        resources:
                          limits:
                            memory: 1Gi
                            cpu: 500m
                  - step:
                      type: Owasp
                      name: Owasp Dependency-Check Scan
                      identifier: Owasp_DependencyCheck_Scan
                      spec:
                        mode: orchestration
                        config: default
                        target:
                          type: repository
                          detection: auto
                        advanced:
                          log:
                            level: info
                          fail_on_severity: high
                          args:
                            cli: "--disableOssIndex"
                        resources:
                          limits:
                            memory: 4Gi
                            cpu: 2000m
